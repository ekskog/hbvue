apiVersion: apps/v1
kind: Deployment
metadata:
  name: hbvue
  namespace: webapps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hbvue
  template:
    metadata:
      labels:
        app: hbvue
    spec:
      containers:
      - name: hbvue
        image: ghcr.io/ekskog/hbvue:latest
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        volumeMounts:
        - name: app-config
          mountPath: /usr/share/nginx/html/config.json
          subPath: config.json
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: hbvue-config
