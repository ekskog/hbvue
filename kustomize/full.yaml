apiVersion: v1
kind: Service
metadata:
  namespace: webapps
  name: hbvue
spec:
  selector:
    app: hbvue
  ports:
    - protocol: TCP
      port: 80
      name: http
  type: LoadBalancer
  loadBalancerIP: 192.168.1.215
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hbvue
  namespace: webapps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hbvue
  template:
    metadata:
      labels:
        app: hbvue
    spec:
      containers:
      - name: hbvue
        image: ghcr.io/lucarv/365vue:latest
        ports:
        - containerPort: 80
